spring:
  application:
    name: rent-insight

  profiles:
    # active: 사용할 프로필을 지정합니다. 'local'로 설정하면,
    # Spring Boot는 application-local.yml 파일을 추가로 읽어와 설정을 덮어씁니다.
    active: local

  # SQL 초기화 설정
  sql:
    init:
      # data_.sql 스크립트의 실행 시점을 설정합니다.
      # always: 내장 데이터베이스가 아니더라도(MySQL 등) 항상 스크립트를 실행합니다.
      mode: always

      #역할: MySQL과 같은 실제 데이터베이스를 사용할 때도 data_.sql 파일을 항상 실행하도록 Spring Boot에게 명시적으로 지시합니다.

      #왜 필요했나: Spring Boot는 기본적으로 MySQL 같은 '운영용' DB에서는 data.sql을
      #자동으로 실행하지 않는 '안전제일' 정책을 가지고 있습니다. 이 설정을 통해 "개발 환경에서는 항상 실행해도 괜찮아!"라고 알려주는 것입니다.

  datasource:
    url: jdbc:mysql://localhost:3306/rentinsight?serverTimezone=Asia/Seoul&useUnicode=true&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    # JPA의 테이블 생성(ddl-auto)이 완료된 후에, data_.sql을 실행하도록 순서를 강제합니다.
    defer-datasource-initialization: true

    #역할: JPA가 테이블을 생성하는 작업(ddl-auto)을 먼저 완료한 후에 data_.sql을 실행하도록 순서를 강제합니다.

    #왜 필요했나: 이 설정이 없으면, 때때로 data_.sql이 테이블이 아직 만들어지기 전에 실행되려 하거나, JPA와 data.sql의 실행 순서가
    #꼬여 데이터가 들어가지 않는 문제가 발생할 수 있습니다.

# MyBatis 설정
mybatis:
  # Mapper XML 파일들의 위치를 지정합니다.
  # classpath: 는 src/main/resources/ 를 의미합니다.
  # /mappers/**/*.xml 는 mappers 폴더와 그 모든 하위 폴더에 있는 .xml 파일을 가리킵니다.
  mapper-locations: classpath:/mappers/**/*.xml
  # MyBatis의 추가 설정을 구성합니다.
  configuration:
    # 데이터베이스의 snake_case 컬럼명(예: contract_date)을
    # Java의 camelCase 필드명(예: contractDate)으로 자동으로 매핑해주는 기능입니다.
    map-underscore-to-camel-case: true
