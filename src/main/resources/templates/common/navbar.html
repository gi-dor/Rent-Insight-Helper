<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-building"></i> Rent Insight
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav align-items-center">
                <li class="nav-item"><a class="nav-link" href="/">홈</a></li>
                <li class="nav-item"><a class="nav-link" href="#">실거래 상세 조회</a></li>
                <li class="nav-item"><a class="nav-link" href="#">통계 분석</a></li>

                <!-- 로그인하지 않은 경우 -->
                <th:block th:if="${session.loginMember == null}">
                    <li class="nav-item ms-2">
                        <a class="btn btn-outline-light btn-sm" th:href="@{/members/login}">로그인</a>
                    </li>
                    <li class="nav-item ms-2">
                        <a class="btn btn-primary btn-sm" th:href="@{/members/join}">회원가입</a>
                    </li>
                </th:block>

                <!-- 로그인한 경우 -->
                <th:block th:if="${session.loginMember != null}">
                    <li class="nav-item ms-2">
                        <span class="navbar-text text-white" th:text="|${session.loginMember.nickname}님 환영합니다.|"></span>
                    </li>
                    <li class="nav-item ms-2">
                        <form th:action="@{/members/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-light btn-sm">로그아웃</button>
                        </form>
                    </li>
                </th:block>
            </ul>
        </div>
    </div>
</nav>
</html>
