<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rent Insight - 전월세 실거래가 분석</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .hero-section {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://images.unsplash.com/photo-1560518883-ce09059eeffa?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 100px 0;
        }
        .feature-card:hover {
            transform: translateY(-5px);
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<!-- 네비게이션 바 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-building"></i> Rent Insight
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav align-items-center">
                <li class="nav-item"><a class="nav-link active" href="/">홈</a></li>
                <li class="nav-item"><a class="nav-link" href="#">실거래 상세 조회</a></li>
                <li class="nav-item"><a class="nav-link" href="#">통계 분석</a></li>
                <!-- 로그인 전 -->
                <li class="nav-item ms-2">
                    <a class="btn btn-outline-light btn-sm" href="/login">로그인</a>
                </li>
                <li class="nav-item ms-2">
                    <a class="btn btn-primary btn-sm" href="/members/join">회원가입</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- 히어로 섹션 (검색창) -->
<section class="hero-section text-center">
    <div class="container">
        <h1 class="display-4 fw-bold mb-4">데이터 기반 전월세 분석의 시작</h1>
        <p class="lead mb-5">원하는 지역의 실거래가 데이터를 가장 빠르고 정확하게 확인하세요.</p>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <form class="d-flex bg-white p-1 rounded shadow">
                    <input class="form-control border-0 me-2" type="search" placeholder="지역명(동) 또는 아파트명을 입력하세요" aria-label="Search">
                    <!--text-nowrap 사용하면 줄바꿈을 하지 않게해줌 -->
                    <button class="btn btn-primary px-4 text-nowrap" type="submit">검색</button>
                </form>
            </div>
        </div>
    </div>
</section>

<!-- 주요 기능 소개 -->
<section class="py-5">
    <div class="container">
        <div class="row g-4 text-center">
            <div class="col-md-4">
                <div class="card h-100 border-0 p-3 feature-card">
                    <div class="card-body">
                        <i class="bi bi-graph-up-arrow text-primary display-4 mb-3"></i>
                        <h4 class="card-title">시세 추이 분석</h4>
                        <p class="card-text text-muted">과거부터 현재까지의 전월세 가격 변동을 그래프로 한눈에 파악하세요.</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100 border-0 p-3 feature-card">
                    <div class="card-body">
                        <i class="bi bi-bell text-warning display-4 mb-3"></i>
                        <h4 class="card-title">맞춤 매물 알림</h4>
                        <p class="card-text text-muted">원하는 지역, 평형, 가격 조건을 설정하면 새로운 실거래 등록 시 알려드립니다.</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100 border-0 p-3 feature-card">
                    <div class="card-body">
                        <i class="bi bi-file-earmark-spreadsheet text-success display-4 mb-3"></i>
                        <h4 class="card-title">데이터 다운로드</h4>
                        <p class="card-text text-muted">검색된 데이터를 엑셀로 다운로드하여 나만의 분석 자료를 만드세요.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- 푸터 -->
<footer th:replace="~{common/footer :: footer}"></footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
