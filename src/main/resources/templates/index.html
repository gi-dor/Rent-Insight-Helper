<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rent Insight - 전월세 실거래가 분석</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap JS (반드시 모달 제어 스크립트보다 위에 위치해야 함) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .hero-section {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://images.unsplash.com/photo-1560518883-ce09059eeffa?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 100px 0;
        }
        .feature-card:hover {
            transform: translateY(-5px);
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* [추가] 푸터를 하단에 고정시키기 위한 Flexbox 스타일 */
        html, body {
            height: 100%;
        }
        body {
            display: flex;
            flex-direction: column;
        }
        main {
            flex-grow: 1;
        }
    </style>
</head>
<body>

<!-- 네비게이션 바 -->
<nav th:replace="~{common/navbar :: navbar}"></nav>

<!-- [추가] 메인 컨텐츠 영역을 <main> 태그로 감싸줍니다. -->
<main>
    <!-- 히어로 섹션 (검색창) -->
    <section class="hero-section text-center">
        <div class="container">
            <h1 class="display-4 fw-bold mb-4">데이터 기반 전월세 분석의 시작</h1>
            <p class="lead mb-5">원하는 지역의 실거래가 데이터를 가장 빠르고 정확하게 확인하세요.</p>

            <div class="row justify-content-center">
                <div class="col-md-8">
                    <form class="d-flex bg-white p-1 rounded shadow">
                        <input class="form-control border-0 me-2" type="search" placeholder="지역명(동) 또는 아파트명을 입력하세요" aria-label="Search">
                        <button class="btn btn-primary px-4 text-nowrap" type="submit">검색</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- 주요 기능 소개 -->
    <section class="py-5">
        <div class="container">
            <div class="row g-4 text-center">
                <div class="col-md-4">
                    <div class="card h-100 border-0 p-3 feature-card">
                        <div class="card-body">
                            <i class="bi bi-graph-up-arrow text-primary display-4 mb-3"></i>
                            <h4 class="card-title">시세 추이 분석</h4>
                            <p class="card-text text-muted">과거부터 현재까지의 전월세 가격 변동을 그래프로 한눈에 파악하세요.</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card h-100 border-0 p-3 feature-card">
                        <div class="card-body">
                            <i class="bi bi-bell text-warning display-4 mb-3"></i>
                            <h4 class="card-title">맞춤 매물 알림</h4>
                            <p class="card-text text-muted">원하는 지역, 평형, 가격 조건을 설정하면 새로운 실거래 등록 시 알려드립니다.</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card h-100 border-0 p-3 feature-card">
                        <div class="card-body">
                            <i class="bi bi-file-earmark-spreadsheet text-success display-4 mb-3"></i>
                            <h4 class="card-title">데이터 다운로드</h4>
                            <p class="card-text text-muted">검색된 데이터를 엑셀로 다운로드하여 나만의 분석 자료를 만드세요.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<!-- 공지사항 모달 Fragment -->
<div th:replace="~{common/noticeModal :: noticeModal}"></div>

<!-- 푸터 -->
<footer th:replace="~{common/footer :: footer}"></footer>

<!-- 공지사항 모달 JS -->
<script>
    // 페이지 모두 열리면 실행됨
    window.onload = function () {
        // 개인 토이 프로젝트급
        // if(document.cookie.includes("hideNotice=true")) {
        //     // 쿠가 있으면 아무것도 안함
        // } else {
        //     // 쿠키 없으면 팝업 띄움
        //     let noticeModal = new bootstrap.Modal(document.getElementById('noticeModal'));
        //     noticeModal.show();
        // }

        // 실제 업무 들어간다면
        if(!getCookie('hideNotice')) {
            let noticeModal = new bootstrap.Modal(document.getElementById('noticeModal'));
            noticeModal.show();
        }
    }


    // 쿠키 확인 함수
    function getCookie(name) {
        let nameCookie = name + "=";
        console.log('nameCookie',nameCookie)    // "hideSearchModal="

        // (2) ['hideNotice=true', ' hideSearchModal=true']
        let splitCookie = document.cookie.split(';');
        console.log('splitCookie',splitCookie)

        for(let i = 0; i < splitCookie.length; i++) {
            let cookie = splitCookie[i];
            console.log('splitCookie[i]',cookie)    // hideNotice=true ,  hideSearchModal=true

            // 두번째 쿠키 부터는 앞에 ' hideSearchModal=true' 이런식으로 공백이있다
            while (cookie.charAt(0) === ' ') {
                cookie = cookie.substring(1, cookie.length);
                console.log('while cookie',cookie)
            }

            if (cookie.indexOf(nameCookie) === 0) {
                console.log('nameCookie.length',nameCookie.length)  // 16
                console.log('cookie.length',cookie.length)          // 20
                console.log('cookieString',cookie)                  // hideSearchModal=true
                return  cookie.substring(nameCookie.length, cookie.length);
            }
        }
        return null;
    }

    function closeNoticeModal() {
        let checkbox = document.getElementById('hideFor24Hours');
        if(checkbox.checked) {
            // 체크 되어있다면 쿠키 설정되어있는 setCookie()
            setCookie("hideNotice","true",1);
        }
    }

    /**
     * @param {string} name - 만들고 싶은 쿠키의 이름
     * @param {string} value - 쿠키에 저장할 값
     * @param {number} days - 쿠키의 유효기간 (일 단위)
     */
    function setCookie(name , value , days) {
        let todayDate = new Date();
        let duration = days * 24 * 60 * 60 * 1000;

        // 현재 시간에 24시간(24 * 60분 * 60초 * 1000밀리초)을 더함
        todayDate.setTime(todayDate.getTime() + duration);

        let expires = todayDate.toUTCString();

        // 쿠키 생성 -  document.cookie 속성을 이용해 쿠키를 create, delete, read
        //  document.cookie = "쿠키이름=쿠키값" document.cookie = "username = 기선";
        document.cookie = name + "=" + value + "; expires=" + expires + "; path=/";
    }
</script>

</body>
</html>
