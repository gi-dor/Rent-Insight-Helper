<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원가입 - Rent Insight</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .signup-card { max-width: 500px; margin: 0 auto; margin-top: 50px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-kakao { background-color: #FEE500; color: #191919; border: none; font-weight: 600; }
        .btn-kakao:hover { background-color: #fdd835; color: #191919; }
        /* Thymeleaf field error style */
        .field-error { border-color: #dc3545; color: #dc3545; }
    </style>
</head>
<body>

<!-- 상단 네비게이션 바 -->
<nav th:replace="~{common/navbar :: navbar}"></nav>

<div class="container mb-5">
    <div class="card signup-card border-0">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <h3 class="fw-bold">회원가입</h3>
                <p class="text-muted">Rent Insight와 함께 똑똑한 내 집 찾기를 시작하세요.</p>
            </div>

            <!-- 회원가입 폼 (Thymeleaf 적용) -->
            <form th:action="@{/members/join}" th:object="${memberDTO}" method="post">

                <!-- 이름 -->
                <div class="mb-3">
                    <label th:for="name" class="form-label">이름 <span class="text-danger">*</span></label>
                    <!-- pattern 속성 추가: 한글만 입력 가능하도록 브라우저 단에서 안내 -->
                    <input type="text" th:field="*{name}" class="form-control" placeholder="실명을 입력하세요 (한글)"
                           th:errorclass="field-error" required pattern="[가-힣]+" title="이름은 한글로만 입력해주세요.">
                    <!-- th:if 덕분에 에러가 없으면 이 div는 아예 보이지 않음 -->
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">이름 오류</div>
                </div>

                <!-- 닉네임 -->
                <div class="mb-3">
                    <label th:for="nickname" class="form-label">닉네임 <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{nickname}" class="form-control" placeholder="닉네임을 입력하세요"
                           th:errorclass="field-error" required minlength="2" maxlength="10">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}">닉네임 오류</div>
                </div>

                <!-- 이메일 -->
                <div class="mb-3">
                    <label th:for="email" class="form-label">이메일 <span class="text-danger">*</span></label>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="이메일을 입력하세요"
                           th:errorclass="field-error" required>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">이메일 오류</div>
                </div>

                <!-- 비밀번호 -->
                <div class="mb-4">
                    <label th:for="password" class="form-label">비밀번호 <span class="text-danger">*</span></label>
                    <input type="password" th:field="*{password}" class="form-control" placeholder="영문, 숫자, 특수문자 포함 8자 이상"
                           th:errorclass="field-error" required>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">비밀번호 오류</div>
                </div>

                <div class="d-grid gap-2 mb-3">
                    <button type="submit" class="btn btn-primary py-2">가입하기</button>
                </div>
            </form>

            <div class="text-center mb-3">
                <span class="text-muted small">또는</span>
            </div>

            <!-- 카카오로 가입하기 -->
            <div class="d-grid gap-2 mb-4">
                <button type="button" class="btn btn-kakao py-2">
                    <i class="bi bi-chat-fill me-2"></i> 카카오 계정으로 가입하기
                </button>
            </div>

            <div class="text-center">
                <p class="small text-muted mb-0">이미 계정이 있으신가요? <a href="/login" class="text-primary text-decoration-none fw-bold">로그인</a></p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
