<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원가입 완료 - Rent Insight</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .success-card { max-width: 500px; margin: 0 auto; margin-top: 80px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        /* 체크 아이콘 애니메이션 */
        .check-icon { font-size: 80px; color: #198754; animation: popUp 0.5s ease-out; }
        @keyframes popUp {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<!-- 상단 네비게이션 바 -->
<nav th:replace="~{common/navbar :: navbar}"></nav>

<div class="container">
    <div class="card success-card border-0 text-center p-5">
        <div class="card-body">
            <!-- 성공 아이콘 -->
            <div class="mb-4">
                <i class="bi bi-check-circle-fill check-icon"></i>
            </div>

            <h2 class="fw-bold mb-3">회원가입 완료!</h2>
            <p class="text-muted mb-4">
                Rent Insight의 회원이 되신 것을 환영합니다.<br>
                이제 로그인하여 모든 서비스를 이용해보세요.
            </p>

            <div class="d-grid gap-2 col-10 mx-auto">
                <!-- 로그인 페이지로 이동 (Primary Action) -->
<!--                <a href="/login" class="btn btn-primary py-2 fw-bold">로그인 하러 가기</a>-->
                <!-- [수정] 컨트롤러의 @RequestMapping("/members")를 포함한 전체 경로로 수정 -->
                <a th:href="@{/members/login}" class="btn btn-primary py-2 fw-bold">로그인 하러 가기</a>

                <!-- 메인 페이지로 이동 (Secondary Action) -->
<!--                <a href="/" class="btn btn-outline-secondary py-2">메인으로 이동</a>-->
                <a th:href="@{/}" class="btn btn-outline-secondary py-2">메인으로 이동</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
